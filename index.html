*{box-sizing:border-box;margin:0;padding:0}

/* HERO */

.hero{

.hero h1{

.btn-gold{

.btn-dark{
border:1px solid var(--gold);

.rating{

.rating span{

}

/* MAP */

.map{
margin-top:60px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.6);

/* SOCIAL */

.social{
margin-top:60px;
text-align:center;

.social a{
margin:0 12px;
color:var(--muted);

.social a:hover{

footer{

@media(max-width:768px){
