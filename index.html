<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />

  <title>El Chiringuito de la Arepa | Arepas venezolanas en Granada</title>
  <meta name="description" content="Autenticidad venezolana, hecha al momento. Arepas artesanales, tequeños, raciones, sopas, bebidas latinas, tres leches casero y pedidos a domicilio en Granada." />
  <link rel="canonical" href="https://elchiringuitodelaarepa.es/" />

  <meta property="og:title" content="El Chiringuito de la Arepa" />
  <meta property="og:description" content="Autenticidad venezolana, hecha al momento. Arepas venezolanas artesanales en Granada." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://elchiringuitodelaarepa.es/" />
  <meta property="og:image" content="https://elchiringuitodelaarepa.es/assets/img/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="/assets/img/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050505;
      --bg2:#070707;
      --text:#f2f2f2;
      --muted:rgba(242,242,242,.72);
      --gold:#b8954c;
      --gold2:#e5c97b;
      --cream:#f1e6cf;
      --green:#25D366;
      --glovo:#f4c542;
      --shadow:0 18px 50px rgba(0,0,0,.55);
      --shadow2:0 10px 26px rgba(0,0,0,.40);
      --line:rgba(255,255,255,.08);
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 520px at 18% 8%, rgba(184,149,76,.16), transparent 60%),
        radial-gradient(900px 420px at 85% 20%, rgba(229,201,123,.09), transparent 62%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      padding-bottom:180px;
    }

    a{ color:inherit; text-decoration:none; }
    img{ display:block; max-width:100%; }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 14px 40px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:80;
      background:rgba(5,5,5,.78);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-inner{
      max-width:980px;
      margin:0 auto;
      padding:12px 14px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
    }

    .brand img{
      width:38px;
      height:38px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      object-fit:cover;
      flex:0 0 auto;
    }

    .brand .t{
      min-width:0;
      line-height:1.1;
    }

    .brand .t b{
      display:block;
      font-size:15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand .t span{
      display:block;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:800;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(184,149,76,.35);
      background:rgba(184,149,76,.10);
      color:var(--gold2);
      font-weight:900;
      white-space:nowrap;
      flex:0 0 auto;
      box-shadow:var(--shadow2);
    }

    .hero{
      margin-top:16px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      overflow:hidden;
      position:relative;
      box-shadow:var(--shadow);
      background:
        radial-gradient(1100px 520px at 30% 10%, rgba(184,149,76,.18), transparent 60%),
        radial-gradient(900px 420px at 90% 20%, rgba(229,201,123,.10), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }

    .hero-inner{
      position:relative;
      padding:28px 18px 24px;
      text-align:center;
    }

    .hero-logo{
      width:86px;
      height:86px;
      margin:0 auto 16px;
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(229,201,123,.28);
      background:rgba(0,0,0,.45);
      box-shadow:0 18px 46px rgba(0,0,0,.55);
    }

    .hero-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .hero-title{
      font-family:'Playfair Display',serif;
      font-size:42px;
      line-height:1.08;
      color:var(--cream);
      margin:0 0 10px;
      letter-spacing:-.6px;
    }

    .hero-sub{
      margin:0 0 22px;
      font-size:18px;
      line-height:1.45;
      color:rgba(242,242,242,.82);
      font-weight:700;
    }

    .cta-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:180px;
      padding:14px 22px;
      border-radius:999px;
      font-weight:900;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:var(--shadow2);
      transition:.18s ease;
      text-align:center;
    }

    .btn.gold{
      background:linear-gradient(90deg, rgba(184,149,76,.88), rgba(229,201,123,.96));
      color:#1b1408;
      border-color:rgba(229,201,123,.34);
    }

    .btn.call{
      background:rgba(37,211,102,.18);
      color:#eafff1;
      border-color:rgba(37,211,102,.20);
    }

    .btn.glovo{
      background:rgba(244,197,66,.16);
      color:#fff3c6;
      border-color:rgba(244,197,66,.26);
    }

    .btn.ghost{
      background:rgba(255,255,255,.03);
      color:var(--gold2);
      border-color:rgba(229,201,123,.24);
    }

    .section{
      margin-top:28px;
    }

    .section-title{
      font-family:'Playfair Display',serif;
      font-size:30px;
      color:var(--gold2);
      margin:0 0 12px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:16px;
    }

    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
      box-shadow:var(--shadow2);
    }

    .card-img{
      width:100%;
      height:180px;
      object-fit:cover;
      display:block;
    }

    .card-body{
      padding:14px;
    }

    .card-body b{
      display:block;
      font-size:20px;
      margin-bottom:6px;
    }

    .card-body p{
      margin:0;
      color:var(--muted);
      font-weight:700;
      line-height:1.45;
    }

    .reviews-card,
    .map-card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:var(--shadow2);
      padding:16px;
      margin-top:12px;
    }

    .stars{
      text-align:center;
      color:var(--gold2);
      font-size:22px;
      letter-spacing:3px;
      margin-bottom:6px;
    }

    .reviews-sub{
      text-align:center;
      color:var(--muted);
      font-weight:700;
      margin-bottom:14px;
    }

    .reviews-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .map-wrap{
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      margin-top:10px;
    }

    .map-wrap iframe{
      width:100%;
      height:300px;
      border:0;
      display:block;
    }

    .socials{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .social{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(229,201,123,.18);
      color:rgba(241,230,207,.92);
      font-weight:900;
      box-shadow:var(--shadow2);
    }

    footer{
      margin-top:26px;
      text-align:center;
      color:rgba(255,255,255,.58);
      font-size:14px;
      line-height:1.7;
      padding-bottom:20px;
    }

    footer a{
      color:rgba(255,255,255,.74);
      text-decoration:underline;
      text-underline-offset:3px;
    }

    .call-float,
    .glovo-float{
      position:fixed;
      right:16px;
      z-index:999;
    }

    .call-float{
      bottom:calc(16px + env(safe-area-inset-bottom));
    }

    .glovo-float{
      bottom:calc(82px + env(safe-area-inset-bottom));
    }

    .call-float a,
    .glovo-float a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 18px;
      border-radius:999px;
      font-weight:950;
      box-shadow:0 18px 42px rgba(0,0,0,.50);
      border:1px solid rgba(255,255,255,.10);
    }

    .call-float a{
      background:linear-gradient(90deg, rgba(184,149,76,.92), rgba(229,201,123,.98));
      color:#1b1408;
    }

    .glovo-float a{
      background:rgba(244,197,66,.16);
      color:#fff3c6;
      border-color:rgba(244,197,66,.24);
      backdrop-filter:blur(10px);
    }

    @media (max-width: 900px){
      .cards{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      .hero-title{ font-size:34px; }
      .hero-sub{ font-size:16px; }
      .btn{ min-width:100%; }
      .map-wrap iframe{ height:260px; }
      .glovo-float{ bottom:calc(88px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
