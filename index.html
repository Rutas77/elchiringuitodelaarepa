  <style>
    :root{
      --bg:#050505;
      --bg2:#090909;
      --text:#f3f3f3;
      --muted:rgba(255,255,255,.70);
      --gold:#b8954c;
      --gold2:#e6cb86;
      --cream:#f4ead7;
      --line:rgba(255,255,255,.08);
      --shadow:0 20px 60px rgba(0,0,0,.55);
      --shadow2:0 12px 30px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      color:var(--text);
      font-family:'Inter',sans-serif;
      background:
        radial-gradient(1200px 600px at 20% 0%, rgba(184,149,76,.14), transparent 60%),
        radial-gradient(1000px 500px at 90% 10%, rgba(230,203,134,.08), transparent 60%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment:fixed;
      overflow-x:hidden;
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .wrap{
      max-width:1200px;
      margin:auto;
      padding:0 20px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:999;
      background:rgba(5,5,5,.78);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .topbar-inner{
      height:78px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand img{
      width:44px;
      height:44px;
      border-radius:14px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.10);
    }

    .brand-text{min-width:0}

    .brand-text b{
      display:block;
      font-size:16px;
      color:#fff;
    }

    .brand-text span{
      display:block;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;

      border:1px solid rgba(230,203,134,.18);
