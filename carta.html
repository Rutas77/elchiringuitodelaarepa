  <style>
    :root{
      --bg:#071010;
      --bg2:#050b0b;
      --text:#eaf1ef;
      --muted:rgba(234,241,239,.72);
      --brand:#b89452;
      --brand2:#e7d2a3;
      --wa:#25D366;
      --r-lg:26px;
      --shadow: 0 14px 40px rgba(0,0,0,.45);
      --shadow2: 0 10px 24px rgba(0,0,0,.35);
      --line: rgba(255,255,255,.08);
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      background:

        radial-gradient(700px 340px at 88% 14%, rgba(231,210,163,.12), transparent 62%),

      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding-bottom: 220px;
    }

    a{ color:inherit; text-decoration:none; }
    img{ max-width:100%; display:block; }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:18px 14px 56px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(14px);
      background: rgba(7,16,16,.72);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .topbar-inner{
      max-width:980px;
      margin:0 auto;
      padding:12px 14px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      flex:1;
    }

    .brand img{

      height:36px;
      border-radius:12px;
      object-fit:cover;
      border:1px solid rgba(255,255,255,.10);
    }

    .brand .t{
      min-width:0;
      display:flex;
      flex-direction:column;
      line-height:1.1;
    }

    .brand .t b{
      font-size:16px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brand .t span{
      font-size:13px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-weight:800;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      box-shadow: 0 10px 20px rgba(0,0,0,.22);
      font-weight:900;
      white-space:nowrap;
    }

    .pill.gold{
      background: rgba(184,148,82,.18);
      border-color: rgba(184,148,82,.28);
      color:#f2e5cf;
    }

    .hero{
      margin-top:18px;
      padding:22px 18px;
      border-radius:var(--r-lg);
      border:1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .hero:before{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(800px 260px at 30% -10%, rgba(184,148,82,.18), transparent 60%);
      pointer-events:none;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:54px;
      letter-spacing:-.9px;
      line-height:1.02;
      position:relative;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.6;
      max-width:70ch;
      font-weight:800;
      position:relative;
    }

    .tabs{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      position:relative;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color:var(--text);
      font-weight:950;
      box-shadow:var(--shadow2);
      cursor:pointer;
      gap:10px;
    }

    .btn.gold{
      background: rgba(184,148,82,.22);
      border-color: rgba(184,148,82,.30);
      color:#fff1d6;
    }
